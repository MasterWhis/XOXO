<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
   
    <div class="section-wrapper">
        <h1>Tic tac Toe</h1>
        <button class="play-game">Play</button>
        <h2 class="status-text"></h2>
        <div class="container"> 
            <div cellIndex="0" class="cell"></div>
            <div cellIndex="1" class="cell"></div>
            <div cellIndex="2" class="cell"></div>
            <div cellIndex="3" class="cell"></div>
            <div cellIndex="4" class="cell"></div>
            <div cellIndex="5" class="cell"></div>
            <div cellIndex="6" class="cell"></div>
            <div cellIndex="7" class="cell"></div>
            <div cellIndex="8" class="cell"></div>
        </div>
        <h2 class="input-title">Enter players name's first</h2>
       <div class="input-container">
           <input type="text" id="player1" placeholder="player1" value="player1">
           <input type="text" id="player2" placeholder="player2" value="player2">
           <button type="submit" id="mySubmit">Submit</button>
       </div>
        
        
    </div>
</body>
</html>
